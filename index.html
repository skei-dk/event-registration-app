<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <main>
        <h1>Event Registration Form</h1>
        <p class="description">
            The form to registrate to the event
        </p>
        <img id="image" src="catWizard.jpg" alt="Cat Wizard">
        <form id="registrationForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName">
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email">
            </div>

            <div class="form-group">
                <label for="Age">Age</label>
                <input type="number" id="Age">
            </div>

            <div class="form-group">
                <label for="StudyField">Study Field</label>
                <select id="StudyField">
                    <option value="">--choose the study field--</option>
                    <option value="Game Design and Development">Game Design and Development</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Avitation Management">Avitation Management</option>
                    <option value="International Management">International Management</option>
                </select>
            </div>
            
            <div class="check-group">
                <input type="checkbox" id="terms">
                <label for="terms">I accept the rule of the event</label>
            </div>

            <button id="submitButton" class="submitButton" type="submit">Registrate</button>
        </form>

        <div class="message-box" id="message-box"></div>

    <div id="participantSection" style="display: none; margin-top: 30px; border-top: 2px solid #e5e7eb; padding-top: 20px;">
        <h2>Registered Participants (<span id="participantCount">0</span>)</h2>
        <ul id="participantList" style="list-style-type: none; padding: 0;">

        </ul>
    </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
